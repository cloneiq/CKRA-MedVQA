<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CKRA-MedVQA Banner</title>
  <desc id="desc">Banner for CKRA-MedVQA: Beyond Static Knowledge, Dynamic Context-Aware Cross-Modal Contrastive Learning for Medical Visual Question Answering.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(230 90) rotate(35) scale(260 160)">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 150) rotate(-25) scale(300 180)">
      <stop offset="0" stop-color="#A7F3D0" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#A7F3D0" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.25"/>
    </filter>

    <linearGradient id="line" x1="160" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#CCFBF1" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="260" rx="28" fill="url(#glow1)"/>
  <rect width="1200" height="260" rx="28" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.10">
    <path d="M80 40H1120" stroke="#E0F2FE"/>
    <path d="M80 90H1120" stroke="#E0F2FE"/>
    <path d="M80 140H1120" stroke="#E0F2FE"/>
    <path d="M80 190H1120" stroke="#E0F2FE"/>
    <path d="M160 25V235" stroke="#E0F2FE"/>
    <path d="M320 25V235" stroke="#E0F2FE"/>
    <path d="M480 25V235" stroke="#E0F2FE"/>
    <path d="M640 25V235" stroke="#E0F2FE"/>
    <path d="M800 25V235" stroke="#E0F2FE"/>
    <path d="M960 25V235" stroke="#E0F2FE"/>
  </g>

  <!-- Decorative cross-modal nodes -->
  <g opacity="0.9" filter="url(#softShadow)">
    <circle cx="128" cy="78" r="8" fill="#CCFBF1"/>
    <circle cx="188" cy="126" r="6" fill="#BAE6FD"/>
    <circle cx="118" cy="176" r="5" fill="#A7F3D0"/>
    <circle cx="1024" cy="72" r="7" fill="#DBEAFE"/>
    <circle cx="1084" cy="126" r="6" fill="#CCFBF1"/>
    <circle cx="1012" cy="184" r="5" fill="#A7F3D0"/>

    <path d="M128 78L188 126L118 176" stroke="#CCFBF1" stroke-width="2" stroke-opacity="0.45"/>
    <path d="M1024 72L1084 126L1012 184" stroke="#CCFBF1" stroke-width="2" stroke-opacity="0.45"/>
  </g>

  <!-- Pill label -->
  <g transform="translate(455 30)">
    <rect width="290" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.13" stroke="#CCFBF1" stroke-opacity="0.35"/>
    <text x="145" y="22" text-anchor="middle"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="14" font-weight="700" letter-spacing="1.6"
          fill="#D1FAE5">IEEE TMI · MEDICAL VQA</text>
  </g>

  <!-- Main title -->
  <text x="600" y="123" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="56" font-weight="800" letter-spacing="1.2"
        fill="#FFFFFF">CKRA-MedVQA</text>

  <!-- Subtitle -->
  <text x="600" y="158" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="19" font-weight="600"
        fill="#E0F2FE">Dynamic Context-Aware Cross-Modal Contrastive Learning</text>

  <!-- Full paper theme -->
  <text x="600" y="190" text-anchor="middle"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="15" font-weight="500"
        fill="#CCFBF1">Beyond Static Knowledge for Medical Visual Question Answering</text>

  <!-- Accent line -->
  <path d="M160 218H1040" stroke="url(#line)" stroke-width="2"/>

  <!-- Keywords -->
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E0F2FE" opacity="0.92">
    <text x="282" y="238" text-anchor="middle">Contextual Knowledge</text>
    <text x="490" y="238" text-anchor="middle">Knowledge-Image Contrastive Learning</text>
    <text x="728" y="238" text-anchor="middle">Dual-Stream Guided Attention</text>
    <text x="934" y="238" text-anchor="middle">SLAKE · VQA-RAD</text>
  </g>
</svg>
